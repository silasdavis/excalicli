name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: excalicli-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: excalicli-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: excalicli-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: excalicli-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: excalicli-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun build --compile --minify --target=${{ matrix.target }} src/cli.ts --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
